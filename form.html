<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Form | Modern UI</title>
  <link href="src/output.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body>
<div class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md  bg-white  shadow-xl shadow-slate-200/60 overflow-hidden border border-slate-100">
      
      <div class="bg-gray-800 p-8 text-center">
        <h2 class="text-2xl font-bold text-white tracking-tight">Add New User</h2>
        <p class="text-blue-100 text-sm mt-1">Fill in the details to create a profile</p>
      </div>

      <form  onsubmit="alert('User added successfully!')" action="User.html" class="bg-white p-6 rounded-lg shadow-md w-full max-w-md space-y-4">
        
        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Full Name</label>
          <input
            class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-500/20 focus:border-black transition-all duration-200 placeholder:text-slate-400"
            type="text"
            name="name"
            placeholder="Piyush Karekar"
            required
          />
        </div>

        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Email Address</label>
          <input
            class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-500/20 focus:border-black transition-all duration-200 placeholder:text-slate-400"
            type="email"
            name="email"
            placeholder="Piyush@gmail.com.com"
            required
          />
        </div>

        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Account Status</label>
          <select
            class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-500/20 focus:border-black transition-all duration-200 appearance-none"
            name="status"
            required
          >
            <option value="" disabled selected>Select Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            class="w-full bg-black hover:bg-gray-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-gray-200 hover:shadow-black transition-all active:scale-[0.98] cursor-pointer">
            Create Account
          </button>
        </div>

        <div class="text-center mt-4">
          <a href="User.html" class="text-slate-400 hover:text-gray-600 text-sm font-medium transition-colors">
            ← Back to Users List
          </a>
        </div>
      </form>
    </div>
</div>
  </body>
</html>
