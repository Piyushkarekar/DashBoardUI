<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Form</title>
    <link href="src/output.css" rel="stylesheet" />
  </head>
  <body class="bg-gray-100">
    <div class="p-6 flex items-center justify-center min-h-screen">
      <form  onsubmit="alert('User added successfully!')" action="index.html" class="bg-white p-6 rounded-lg shadow-md w-full max-w-md space-y-4">
        <h2 class="text-xl font-semibold text-gray-800 text-center">
          Add User
        </h2>

        <input
          class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          type="text"
          name="name"
          placeholder="Full Name"
          required
        />

        <input
          class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          type="email"
          name="email"
          placeholder="Email"
          required
        />

        <!-- Status Dropdown -->
        <select
          class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500"
          name="status"
          required
        >
          <option value="">Select Status</option>
          <option value="active">Active</option>
          <option  value="inactive">
            Inactive
          </option>
        </select>

        <button
          type="submit"
          class="w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
          Submit
        </button>
         <a href="User.html" class="text-gray-500 hover:text-gray-700 text-sm underline">Back to Users</a>
      </form>
      
    </div>
    
  </body>
</html>
