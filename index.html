<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link href="src/output.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>

  <body class="bg-gray-100">
    
    <div class="  flex min-h-screen">
      
      <!-- Sidebar -->
       <input type="checkbox" id="sidebar-toggle" class="hidden peer">
<!-- Sidebar -->
<aside class="fixed top-0 left-0 h-screen w-72 bg-gray-900 text-white
              transition-all duration-300
              peer-checked:w-20 overflow-hidden">

  <!-- Header -->
  <div class="p-6 border-b flex items-center justify-between border-gray-700">

    <!-- Title -->
    <h2 class="text-2xl font-bold whitespace-nowrap overflow-hidden
               transition-all duration-300
               peer-checked:opacity-0 peer-checked:w-0">
      Dashboard UI
    </h2>

    <!-- Toggle Button -->
    <label for="sidebar-toggle"
      class="px-3 py-2 bg-amber-300 rounded-full cursor-pointer shrink-0">

      <i class="fa-solid fa-bars text-white"></i>

    </label>

  </div>

  <!-- Nav -->
  <nav class="space-y-3 p-4">

    <!-- Dashboard -->
    <a href="index.html"
      class="flex items-center gap-3 p-3 rounded hover:bg-gray-200 hover:text-black transition">

      <i class="fa-solid fa-gauge text-lg w-6 text-center"></i>

      <span class="whitespace-nowrap overflow-hidden
                   transition-all duration-300
                   peer-checked:opacity-0 peer-checked:w-0">
        Dashboard
      </span>

    </a>

    <!-- Orders -->
    <a href="order.html"
      class="flex items-center gap-3 p-3 rounded hover:bg-gray-200 hover:text-black transition">

      <i class="fa-solid fa-cart-shopping text-lg w-6 text-center"></i>

      <span class="whitespace-nowrap overflow-hidden
                   transition-all duration-300
                   peer-checked:opacity-0 peer-checked:w-0">
        Orders
      </span>

    </a>

    <!-- Users -->
    <a href="User.html"
      class="flex items-center gap-3 p-3 rounded hover:bg-gray-200 hover:text-black transition">

      <i class="fa-solid fa-users text-lg w-6 text-center"></i>

      <span class="whitespace-nowrap overflow-hidden
                   transition-all duration-300
                   peer-checked:opacity-0 peer-checked:w-0">
        User Management
      </span>

    </a>

  </nav>

</aside>

      <!-- Main Content -->
  <!-- Main Content -->
<div class="flex-1 ml-72 peer-checked:ml-20 transition-all duration-300 bg-gray-200 min-h-screen">

  <div class="container mx-auto px-4 py-6">

    <!-- Top Bar -->
    <div class="flex justify-between items-center h-16 bg-white rounded-lg shadow-sm px-4 mb-6">

      <h2 class="text-lg md:text-xl font-semibold">Admin Panel</h2>

      <div class="flex items-center gap-3">
        <p class="font-medium hidden sm:block">Admin</p>

        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">
          A
        </div>
      </div>

    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <h3 class="text-gray-500 text-sm">Total Users</h3>
        <p class="text-2xl font-bold mt-1">1,245</p>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <h3 class="text-gray-500 text-sm">Total Orders</h3>
        <p class="text-2xl font-bold mt-1">856</p>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <h3 class="text-gray-500 text-sm">Revenue</h3>
        <p class="text-2xl font-bold mt-1">₹10,00,000+</p>
      </div>

    </div>

    <!-- Charts Section -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Pie Chart -->
      <div class="bg-white p-6 rounded-xl shadow-sm">

        <h2 class="text-lg font-semibold mb-4 text-center">
          Orders Overview
        </h2>

        <div class="flex justify-center mb-4">
          <div class="w-40 h-40 md:w-48 md:h-48 rounded-full"
            style="background: conic-gradient(
              #22c55e 0% 45%,
              #facc15 45% 70%,
              #3b82f6 70% 90%,
              #ef4444 90% 100%
            );">
          </div>
        </div>

        <div class="space-y-2 text-sm">

          <div class="flex items-center gap-2">
            <span class="w-3 h-3 bg-green-500 rounded-full"></span>
            Completed (45%)
          </div>

          <div class="flex items-center gap-2">
            <span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
            Pending (25%)
          </div>

          <div class="flex items-center gap-2">
            <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
            Upcoming (20%)
          </div>

          <div class="flex items-center gap-2">
            <span class="w-3 h-3 bg-red-500 rounded-full"></span>
            Incomplete (10%)
          </div>

        </div>

      </div>

      <!-- Sales Chart -->
      <div class="bg-white p-6 rounded-xl shadow-sm">

        <h2 class="text-lg font-semibold mb-4">
          Sales Overview
        </h2>

        <div class="space-y-4">

          <!-- Item -->
          <div>
            <div class="flex justify-between text-sm mb-1">
              <span>Jan</span>
              <span>$45K</span>
            </div>
            <div class="w-full bg-gray-200 h-3 rounded">
              <div class="bg-yellow-400 h-3 rounded w-[45%]"></div>
            </div>
          </div>

          <div>
            <div class="flex justify-between text-sm mb-1">
              <span>Feb</span>
              <span>$40K</span>
            </div>
            <div class="w-full bg-gray-200 h-3 rounded">
              <div class="bg-blue-500 h-3 rounded w-[40%]"></div>
            </div>
          </div>

          <div>
            <div class="flex justify-between text-sm mb-1">
              <span>Mar</span>
              <span>$60K</span>
            </div>
            <div class="w-full bg-gray-200 h-3 rounded">
              <div class="bg-green-500 h-3 rounded w-[60%]"></div>
            </div>
          </div>

          <div>
            <div class="flex justify-between text-sm mb-1">
              <span>Apr</span>
              <span>$20K</span>
            </div>
            <div class="w-full bg-gray-200 h-3 rounded">
              <div class="bg-red-500 h-3 rounded w-[20%]"></div>
            </div>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>
  </body>
</html>
