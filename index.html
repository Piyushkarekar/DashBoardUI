<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="src/output.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<body class="bg-gray-100">

<div class="flex">

<!-- ✅ ONLY ONE CHECKBOX -->
<input type="checkbox" id="sidebar-toggle" class="hidden peer">

<!-- ================= SIDEBAR ================= -->
<aside class="fixed top-0 left-0 h-screen w-72 bg-gray-900 text-white
              -translate-x-full
              peer-checked:translate-x-0
              transition-transform duration-300
              md:translate-x-0
              md:peer-checked:w-20
              overflow-hidden z-40">

  <div class="px-6 py-3  border-b flex items-center justify-between border-gray-700">
    <h2 class="text-xl font-bold whitespace-nowrap overflow-hidden transition-all duration-300 
              md:peer-checked:opacity-0 md:peer-checked:w-0">
      Dashboard
    </h2>
    
        <label for="sidebar-toggle" class="cursor-pointer">
      <div class="md:hidden text-gray-400 hover:text-white p-2">
        <i class="fa-solid fa-xmark text-2xl"></i>
      </div>
    <!-- Desktop Collapse Button -->
    <label for="sidebar-toggle" 
      class="hidden md:block px-3 py-2 bg-amber-400 rounded-lg cursor-pointer hover:bg-amber-500 transition-colors">
      <i class="fa-solid fa-bars text-gray-900"></i>
    </label>
  </div>

  <nav class="flex-1 p-4 space-y-2">

    <a href="index.html"
      class="flex items-center gap-4 p-3 rounded-lg hover:bg-gray-800 transition">
      <i class="fa-solid fa-gauge w-6 text-amber-400"></i>
      <span class="whitespace-nowrap overflow-hidden transition-all duration-300
                   md:peer-checked:opacity-0 md:peer-checked:w-0">
        Dashboard
      </span>
    </a>

    <a href="order.html"
      class="flex items-center gap-4 p-3 rounded-lg hover:bg-gray-800 transition">
      <i class="fa-solid fa-cart-shopping w-6 text-amber-400"></i>
      <span class="whitespace-nowrap overflow-hidden transition-all duration-300
                   md:peer-checked:opacity-0 md:peer-checked:w-0">
        Orders
      </span>
    </a>

    <a href="User.html"
      class="flex items-center gap-4 p-3 rounded-lg hover:bg-gray-800 transition">
      <i class="fa-solid fa-users w-6 text-amber-400"></i>
      <span class="whitespace-nowrap overflow-hidden transition-all duration-300
                   md:peer-checked:opacity-0 md:peer-checked:w-0">
        Users
      </span>
    </a>

  </nav>
</aside>

<!-- ================= TOP BAR ================= -->
<div class="fixed top-0 right-0 h-16 bg-white border-b border-gray-200
            flex justify-between items-center px-6 z-30
            transition-all duration-300
            left-0
            md:left-72
            md:peer-checked:left-20">

  <div class="flex items-center gap-3">

    <!-- ✅ Mobile Hamburger -->
    <label for="sidebar-toggle" class="md:hidden cursor-pointer">
      <i class="fa-solid fa-bars text-xl"></i>
    </label>

    <h2 class="text-xl font-semibold">Admin Panel</h2>
  </div>

  <div class="flex items-center gap-3">
    <p class="font-medium">Admin</p>
    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">
      A
    </div>
  </div>
</div>

<!-- ================= CONTENT ================= -->
  <div
        class="flex-1 ml-0 md:ml-72 md:peer-checked:ml-20 transition-all duration-300 pt-15  min-h-screen w-full"
      >
        <main class="p-6">
          <!-- Stats Cards -->
          <div
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-6" >

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all group cursor-pointer">
    <div class="flex justify-between items-start">
      <div class="w-12 h-12 flex items-center justify-center bg-blue-50 text-blue-600 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
        <i class="fa-solid fa-users text-xl"></i>
      </div>
      <span class="text-green-500 text-xs font-bold bg-green-50 px-2 py-1 rounded-lg">+12%</span>
    </div>
    <div class="mt-4">
      <h3 class="text-slate-500 text-sm font-medium">Total Users</h3>
      <p class="text-3xl font-bold text-slate-800 tracking-tight">1,245</p>
    </div>
  </div>

             <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all group cursor-pointer">
    <div class="flex justify-between items-start">
      <div class="w-12 h-12 flex items-center justify-center bg-purple-50 text-purple-600 rounded-xl group-hover:bg-purple-600 group-hover:text-white transition-colors">
        <i class="fa-solid fa-cart-shopping text-xl"></i>
      </div>
      <span class="text-green-500 text-xs font-bold bg-green-50 px-2 py-1 rounded-lg">+5%</span>
    </div>
    <div class="mt-4">
      <h3 class="text-slate-500 text-sm font-medium">Total Orders</h3>
      <p class="text-3xl font-bold text-slate-800 tracking-tight">856</p>
    </div>
  </div>

           <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all group cursor-pointer">
    <div class="flex justify-between items-start">
      <div class="w-12 h-12 flex items-center justify-center bg-emerald-50 text-emerald-600 rounded-xl group-hover:bg-emerald-600 group-hover:text-white transition-colors">
        <i class="fa-solid fa-indian-rupee-sign text-xl"></i>
      </div>
      <span class="text-white text-xs font-bold bg-red-600 px-2 py-1 rounded-lg">Live</span>
    </div>
    <div class="mt-4">
      <h3 class="text-slate-500 text-sm font-medium">Revenue</h3>
      <p class="text-3xl font-bold text-slate-800 tracking-tight">₹10,00,000</p>
    </div>
  </div>
          </div>

          <!-- Charts Section -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Pie Chart -->
            <div class="bg-white p-6 rounded-xl shadow-sm">
              <h2 class="text-lg font-semibold mb-4 text-center">
                Orders Overview
              </h2>

              <div class="flex justify-center mb-4">
                <div
                  class="w-40 h-40 md:w-48 md:h-48 rounded-full"
                  style="
                    background: conic-gradient(
                      #22c55e 0% 45%,
                      #facc15 45% 70%,
                      #3b82f6 70% 90%,
                      #ef4444 90% 100%
                    );
                  "
                ></div>
              </div>

              <div class="space-y-2 text-sm">
                <div class="flex items-center gap-2">
                  <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                  Completed (45%)
                </div>
                <div class="flex items-center gap-2">
                  <span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
                  Pending (25%)
                </div>
                <div class="flex items-center gap-2">
                  <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
                  Upcoming (20%)
                </div>
                <div class="flex items-center gap-2">
                  <span class="w-3 h-3 bg-red-500 rounded-full"></span>
                  Incomplete (10%)
                </div>
              </div>
            </div>

            <!-- Sales Overview -->
            <div class="bg-white p-6 rounded-xl shadow-sm">
              <h2 class="text-lg font-semibold mb-4">Sales Overview</h2>

              <div class="space-y-4">
                <div>
                  <div class="flex justify-between text-sm mb-1">
                    <span>Jan</span>
                    <span>$45K</span>
                  </div>
                  <div class="w-full bg-gray-200 h-3 rounded">
                    <div class="bg-yellow-400 h-3 rounded w-[45%]"></div>
                  </div>
                </div>

                <div>
                  <div class="flex justify-between text-sm mb-1">
                    <span>Feb</span>
                    <span>$40K</span>
                  </div>
                  <div class="w-full bg-gray-200 h-3 rounded">
                    <div class="bg-blue-500 h-3 rounded w-[40%]"></div>
                  </div>
                </div>

                <div>
                  <div class="flex justify-between text-sm mb-1">
                    <span>Mar</span>
                    <span>$60K</span>
                  </div>
                  <div class="w-full bg-gray-200 h-3 rounded">
                    <div class="bg-green-500 h-3 rounded w-[60%]"></div>
                  </div>
                </div>

                <div>
                  <div class="flex justify-between text-sm mb-1">
                    <span>Apr</span>
                    <span>$20K</span>
                  </div>
                  <div class="w-full bg-gray-200 h-3 rounded">
                    <div class="bg-red-500 h-3 rounded w-[20%]"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>

</body>
</html>
