<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="src/output.css" rel="stylesheet" />
</head>
<body class="bg-gray-300">
    <div class="bg-white  p-8 rounded-xl shadow-md w-[800px]   mx-auto mt-10">

  <h2 class="text-4xl font-bold mb-6">
    New Order
  </h2>

  <form class="space-y-6">

    <!-- Order ID -->
    <div>
      <label class="block mb-2 font-medium">Order ID</label>
      <input 
        type="text" 
        placeholder="#1234"
        required
        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Customer Name -->
    <div>
      <label class="block mb-2 font-medium">Customer Name</label>
      <input 
        type="text" 
        placeholder="Enter customer name"
         required
        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Order Date -->
    <div>
      <label class="block mb-2 font-medium">Order Date</label>
      <input 
        type="date"
         required
        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Total Amount -->
    <div>
      <label class="block mb-2 font-medium">Total Amount</label>
      <input 
        type="number"
        placeholder="₹ 0.00"
         required
        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Payment Status -->
    <div>
      <label class="block mb-2 font-medium">Payment Status</label>
    
      <select 
        required
        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option>Paid</option>
        <option>Pending</option>
        <option>Failed</option>
      </select>
    </div>

    <!-- Order Status -->
    <div>
      <label class="block mb-2 font-medium">Order Status</label>
      <select 
        required
        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option>Completed</option>
        <option>Pending</option>
        <option>InComplete</option>
      </select>
    </div>

    <!-- Buttons -->
    <div class="flex justify-between  gap-4 pt-4">
        <div>
      <button 
        type="submit"
        class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition"
      >
        Add Order
      </button>

      <button 
        type="reset"
        class="bg-gray-400 text-white px-6 py-3 rounded-lg hover:bg-gray-500 transition"
      >
        Reset
      </button>
      </div>
       <a href="order.html" class="text-gray-500   hover:text-gray-700 text-sm underline">Back to Orders</a>
    </div>

  </form>
</div>
</body>
</html>
