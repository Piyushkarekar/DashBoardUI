<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Order | Admin Dashboard</title>
     <link href="src/output.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
  </head>
  <body class="flex min-h-screen items-center justify-center bg-slate-100 p-4 md:p-8">
    <div class="w-full max-w-3xl overflow-hidden rounded-2xl border border-white bg-white shadow-2xl shadow-slate-200">
      <div class="flex items-center justify-between border-b border-slate-100 bg-white p-8">
        <div>
          <h2 class="text-3xl font-bold tracking-tight text-slate-800">Create New Order</h2>
          <p class="mt-1 text-sm text-slate-500">Generate a new transaction record for your store.</p>
        </div>
        <div class="hidden sm:block">
          <span class="rounded-full bg-blue-50 px-3 py-1 text-xs font-bold tracking-widest text-blue-600 uppercase">Order Entry</span>
        </div>
      </div>

      <form  class="space-y-6 p-8"  onsubmit="alert('User added successfully!')" action="order.html">
        <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">Order ID</label>
            <input type="text" placeholder="#ORD-9921" required class ="w-full rounded-xl border border-slate-200 bg-slate-50 p-3 transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 focus:outline-none" />
          </div>

          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">Order Date</label>
            <input type="date" required class="w-full rounded-xl border border-slate-200 bg-slate-50 p-3 transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 focus:outline-none" />
          </div>

          <div class="space-y-2 md:col-span-2">
            <label class="text-sm font-semibold text-slate-700">Customer Name</label>
            <input type="text" placeholder="e.g. Piyush karekar" required class="w-full rounded-xl border border-slate-200 bg-slate-50 p-3 transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 focus:outline-none" />
          </div>

          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">Total Amount (₹)</label>
            <div class="relative">
              <span class="absolute top-3.5 left-3 text-slate-400">₹</span>
              <input type="number" placeholder="0.00" required class="w-full rounded-xl border border-slate-200 bg-slate-50 p-3 pl-8 transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 focus:outline-none" />
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">Payment Status</label>
            <select required class="w-full cursor-pointer appearance-none rounded-xl border border-slate-200 bg-slate-50 p-3 transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 focus:outline-none">
              <option value="" disabled selected>Select status</option>
              <option>Paid</option>
              <option>Pending</option>
              <option>Failed</option>
            </select>
          </div>

          <div class="space-y-2 md:col-span-2">
            <label class="text-sm font-semibold text-slate-700">Order Delivery Status</label>
            <select required class="w-full cursor-pointer appearance-none rounded-xl border border-slate-200 bg-slate-50 p-3 transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 focus:outline-none">
              <option>Completed</option>
              <option>Pending</option>
              <option>InComplete</option>
            </select>
          </div>
        </div>

        <div class="flex flex-col items-center justify-between gap-4 border-t border-slate-100 pt-6 sm:flex-row">
          <a href="order.html" class="order-2 text-sm font-medium text-slate-400 transition-colors hover:text-slate-600 sm:order-1"> &larr; Back to Orders </a>

          <div class="order-1 flex w-full gap-3 sm:order-2 sm:w-auto">

            <button type="reset" class="flex-1 rounded-xl border border-slate-200 px-6 py-3 font-semibold text-slate-600 transition-all hover:bg-slate-50 active:scale-95 sm:flex-none">Reset</button>

            <button type="submit" class="flex-1 rounded-xl bg-blue-600 px-8 py-3 font-bold text-white shadow-lg shadow-blue-200 transition-all hover:bg-blue-700 hover:shadow-blue-300 active:scale-95 sm:flex-none">Create Order</button>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
